name: Deploy Netlify

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Stage only the site files so infra source is never published as static assets
      - name: Stage site
        run: |
          mkdir dist
          cp index.html dist/

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify-cli@17 deploy --prod --dir dist
