<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shot Log</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --field: #0e2a1f;
    --field-deep: #0a1f17;
    --line: #1d4535;
    --chalk: #f2f5f0;
    --chalk-dim: #8ba596;
    --flag: #e8613c;
    --gold: #e4c261;
    --card: #12352690;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% 0%, var(--field) 0%, var(--field-deep) 100%);
    background-attachment: fixed;
    color: var(--chalk);
    font-family: ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 18px calc(env(safe-area-inset-bottom) + 40px);
    line-height: 1.4;
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  }
  h1 {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--chalk-dim);
  }
  h1 .dot { color: var(--flag); }
  .hbtns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .reload {
    background: none; border: 1px solid var(--line); color: var(--chalk-dim);
    font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 7px 12px; border-radius: 999px; cursor: pointer;
  }
  .reload:active { background: var(--line); }
  .reload.active { background: var(--flag); border-color: var(--flag); color: #1a0d08; }

  /* user filter */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 0 0; }
  .chip {
    background: none; border: 1px solid var(--line); color: var(--chalk-dim);
    font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 6px 12px; border-radius: 999px; cursor: pointer;
  }
  .chip.active { background: var(--gold); border-color: var(--gold); color: #1a1405; }

  .totals {
    display: flex; flex-wrap: wrap; gap: 26px; padding: 22px 0 8px;
  }
  .totals .stat .n {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 30px; font-weight: 600; letter-spacing: -0.01em; line-height: 1;
  }
  .totals .stat .l {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--chalk-dim);
    margin-top: 7px;
  }

  .section-label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--chalk-dim);
    margin: 34px 0 14px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  /* per-club bars */
  .club {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 9px;
  }
  .club-top { display: flex; align-items: baseline; justify-content: space-between; }
  .club-name { font-size: 16px; font-weight: 600; letter-spacing: 0.01em; }
  .club-avg {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 22px; font-weight: 600;
  }
  .club-avg .u { font-size: 11px; color: var(--chalk-dim); margin-left: 3px; }
  .club-meta {
    font-size: 11px; color: var(--chalk-dim); letter-spacing: 0.04em; margin-top: 3px;
    display: flex; gap: 14px;
  }
  .bar { height: 5px; background: var(--line); border-radius: 3px; margin-top: 11px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--flag)); border-radius: 3px; }

  /* shot log */
  .shot {
    display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 12px;
    padding: 12px 4px; border-bottom: 1px solid var(--line);
  }
  .shot.nodel { grid-template-columns: auto 1fr auto; }
  .shot .del {
    background: none; border: none; color: var(--chalk-dim); padding: 6px; margin: -6px -2px -6px 0;
    display: flex; align-items: center; cursor: pointer; border-radius: 8px;
    opacity: 0.55; transition: opacity 0.12s, color 0.12s;
  }
  .shot .del:active { opacity: 1; color: var(--flag); background: var(--line); }
  @media (hover: hover) { .shot .del:hover { opacity: 1; color: var(--flag); } }
  .shot .club-tag {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; font-weight: 600;
    min-width: 46px;
  }
  .shot .when { font-size: 12px; color: var(--chalk-dim); }
  .shot .dist {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 17px; font-weight: 600;
    text-align: right;
  }
  .shot .dist .u { font-size: 10px; color: var(--chalk-dim); margin-left: 2px; }
  .shot .lowconf { color: var(--flag); font-size: 10px; letter-spacing: 0.1em; }
  .shot .editedtag { color: var(--chalk-dim); font-size: 10px; letter-spacing: 0.1em; }
  .shot .who { color: var(--gold); font-size: 11px; }
  .sg-pos { color: #7ed957; }
  .sg-neg { color: var(--flag); }
  .sgtag { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  .footnote { font-size: 11px; color: var(--chalk-dim); letter-spacing: 0.03em; margin-top: 4px; }

  /* round groups (date + course) */
  .round-hd {
    width: 100%; display: flex; align-items: baseline; gap: 10px;
    background: none; border: none; border-bottom: 1px solid var(--line);
    color: var(--chalk); font: inherit; text-align: left;
    padding: 13px 4px; cursor: pointer;
  }
  .round-hd:active { background: var(--card); }
  .round-hd .chev { color: var(--chalk-dim); font-size: 10px; flex: none; width: 13px; }
  .round-hd .round-title { flex: 1; font-size: 14px; font-weight: 600; letter-spacing: 0.01em; }
  .round-hd .round-title .course { color: var(--gold); }
  .round-hd .round-meta {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    color: var(--chalk-dim); white-space: nowrap;
  }
  .round-rows { padding-left: 10px; }
  .morewrap { text-align: center; padding: 20px 0 4px; }

  /* map */
  #map {
    height: 340px; border-radius: 14px; border: 1px solid var(--line);
    background: var(--field-deep); overflow: hidden;
  }
  .edithint {
    font-size: 11px; color: var(--chalk-dim); letter-spacing: 0.03em;
    margin-top: 9px; text-align: center;
  }
  .leaflet-container { background: var(--field-deep); font-family: inherit; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--field-deep); color: var(--chalk);
    box-shadow: 0 2px 14px rgba(0,0,0,0.5);
  }
  .leaflet-popup-content { font-size: 13px; line-height: 1.5; }
  .cdot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    margin-right: 8px;
  }
  .drag-pin {
    width: 18px; height: 18px; border-radius: 50%; box-sizing: border-box;
    box-shadow: 0 0 0 2px rgba(10,31,23,0.65), 0 1px 6px rgba(0,0,0,0.5);
  }

  .msg { text-align: center; color: var(--chalk-dim); padding: 60px 20px; font-size: 14px; }
  .msg.err { color: var(--flag); }

  /* device keys panel */
  .overlay {
    position: fixed; inset: 0; background: rgba(5, 15, 11, 0.82);
    display: flex; align-items: flex-end; justify-content: center; z-index: 2000;
  }
  .panel {
    background: var(--field-deep); border: 1px solid var(--line);
    border-radius: 18px 18px 0 0; width: 100%; max-width: 620px;
    max-height: 82vh; overflow: auto;
    padding: 20px 18px calc(env(safe-area-inset-bottom) + 24px);
  }
  .panel .section-label { margin-top: 6px; }
  .panel p { font-size: 13px; color: var(--chalk-dim); margin: 10px 0; }
  .panel code.inline { color: var(--gold); font-family: ui-monospace, monospace; font-size: 12px; }
  .keyrow {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .keyrow .klabel { flex: 1; }
  .keyrow .kmeta { color: var(--chalk-dim); font-family: ui-monospace, monospace; font-size: 11px; }
  .newkey {
    background: var(--card); border: 1px dashed var(--gold); border-radius: 12px;
    padding: 14px; margin: 14px 0;
  }
  .newkey code { font-family: ui-monospace, monospace; font-size: 13px; word-break: break-all; color: var(--gold); }
  .newkey .warn { font-size: 11px; color: var(--chalk-dim); margin-top: 8px; }
  .krow-actions { display: flex; gap: 10px; margin-top: 14px; }
  .krow-actions input {
    flex: 1; background: none; border: 1px solid var(--line); border-radius: 999px;
    color: var(--chalk); font-size: 13px; padding: 8px 14px; outline: none;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ---- config ----
const CONFIG = {
  base: "https://uuviw83w0h.execute-api.us-east-1.amazonaws.com",
  auth: {
    domain: "https://nevermissthegreen.auth.us-east-1.amazoncognito.com",
    clientId: "48c6i098puma903mgpb6d5spmj",
    redirectUri: location.origin + location.pathname
  }
};
const ACCURACY_FLAG_M = 8; // shots recorded with worse GPS than this get flagged
const PALETTE = ["#e4c261","#5ec8e5","#e8613c","#a78bfa","#7ed957","#ff8fab","#38bdf8","#facc15","#c084fc","#4ade80","#fb7185","#f97316","#22d3ee","#fbbf24"];

const app = document.getElementById("app");

// ---- auth (Cognito hosted UI, OAuth2 code flow + PKCE) ----
const tok = {
  get id() { return localStorage.getItem("nmg_id"); },
  get refresh() { return localStorage.getItem("nmg_refresh"); },
  set(t) {
    if (t.id_token) localStorage.setItem("nmg_id", t.id_token);
    if (t.refresh_token) localStorage.setItem("nmg_refresh", t.refresh_token);
  },
  clear() { localStorage.removeItem("nmg_id"); localStorage.removeItem("nmg_refresh"); }
};

function b64url(bytes) {
  return btoa(String.fromCharCode(...bytes)).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function jwtExp(token) {
  try {
    return JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/"))).exp * 1000;
  } catch { return 0; }
}

async function login() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  sessionStorage.setItem("nmg_verifier", verifier);
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  const p = new URLSearchParams({
    client_id: CONFIG.auth.clientId,
    response_type: "code",
    scope: "openid email profile",
    redirect_uri: CONFIG.auth.redirectUri,
    code_challenge: b64url(new Uint8Array(digest)),
    code_challenge_method: "S256"
  });
  location.href = `${CONFIG.auth.domain}/oauth2/authorize?${p}`;
}

async function tokenRequest(params) {
  const r = await fetch(`${CONFIG.auth.domain}/oauth2/token`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: CONFIG.auth.clientId, ...params })
  });
  if (!r.ok) throw new Error("token endpoint " + r.status);
  return r.json();
}

async function handleCallback() {
  const code = new URLSearchParams(location.search).get("code");
  if (!code) return;
  const verifier = sessionStorage.getItem("nmg_verifier");
  sessionStorage.removeItem("nmg_verifier");
  try {
    tok.set(await tokenRequest({
      grant_type: "authorization_code",
      code,
      redirect_uri: CONFIG.auth.redirectUri,
      code_verifier: verifier
    }));
  } catch (e) { /* token exchange failed; login screen will show */ }
  history.replaceState(null, "", location.pathname);
}

async function ensureToken() {
  const t = tok.id;
  if (t && jwtExp(t) - Date.now() > 60000) return t;
  if (!tok.refresh) return null;
  try {
    tok.set(await tokenRequest({ grant_type: "refresh_token", refresh_token: tok.refresh }));
    return tok.id;
  } catch { tok.clear(); return null; }
}

// returns null when not signed in — callers show the login screen
async function authFetch(url, opts = {}) {
  const t = await ensureToken();
  if (!t) return null;
  opts.headers = { ...(opts.headers || {}), Authorization: "Bearer " + t };
  return fetch(url, opts);
}

function signOut() {
  tok.clear();
  const p = new URLSearchParams({
    client_id: CONFIG.auth.clientId,
    logout_uri: CONFIG.auth.redirectUri
  });
  location.href = `${CONFIG.auth.domain}/logout?${p}`;
}

// ---- session state ----
let currentShots = [];
let filterUser = null;   // null = everyone
let clubColorMap = {};
let paletteIdx = 0;
let mapRef = null;
let shotLayers = {};   // uid -> { line, dot }
let editMode = false;
let editPins = [];     // { marker, s, which }

// shot-log pagination: rounds (date + course groups), newest first
const ROUNDS_PER_PAGE = 5;
let logPage = 1;
let expandedRounds = new Set(); // round keys currently open
let autoExpanded = false;       // newest round opens once per load

function visible() {
  return filterUser ? currentShots.filter(s => s.user === filterUser) : currentShots;
}

function multiUser() {
  return new Set(currentShots.map(s => s.user)).size > 1;
}

function fmtWhen(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}

function dateKey(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function fmtDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const opts = { weekday: "short", month: "short", day: "numeric" };
  if (d.getFullYear() !== new Date().getFullYear()) opts.year = "numeric";
  return d.toLocaleDateString([], opts);
}

function fmtTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

function isLowConf(s) {
  return !s.edited && s.accuracy != null && s.accuracy > ACCURACY_FLAG_M;
}

function popupHtml(s) {
  return `<b>${s.club}</b> — ${Math.round(s.distance_yds)} yds<br>${fmtWhen(s.ts)}`
    + (s.sg != null ? `<br>SG ${fmtSG(s.sg, 2)}` : "")
    + (multiUser() ? `<br><span style="opacity:0.7">${s.user}</span>` : "")
    + (s.edited ? `<br><span style="opacity:0.7">edited</span>` : "")
    + (isLowConf(s) ? `<br>low GPS confidence (±${Math.round(s.accuracy)}m)` : "");
}

function header() {
  return `
    <header>
      <h1>SHOT LOG<span class="dot">.</span></h1>
      <div class="hbtns">
        <button class="reload" id="keys">Keys</button>
        <button class="reload" id="edit">Edit</button>
        <button class="reload" id="reload">Reload</button>
        <button class="reload" id="signout">Sign out</button>
      </div>
    </header>`;
}

function wireHeader() {
  const r = document.getElementById("reload");
  if (r) r.onclick = load;
  const k = document.getElementById("keys");
  if (k) k.onclick = showKeys;
  const e = document.getElementById("edit");
  if (e) e.onclick = toggleEdit;
  const o = document.getElementById("signout");
  if (o) o.onclick = signOut;
}

function hideEditBtn() {
  const eb = document.getElementById("edit");
  if (eb) eb.style.display = "none";
}

function loginScreen() {
  app.innerHTML = `
    <header><h1>SHOT LOG<span class="dot">.</span></h1></header>
    <div class="msg">Every club. Every shot. One tap.<br><br>Sign in to see the shared shot log.</div>
    <div style="text-align:center"><button class="reload" id="signin">Sign in / Sign up</button></div>`;
  document.getElementById("signin").onclick = login;
}

function errorScreen(msg) {
  app.innerHTML = header() + `
    <div class="msg err">${msg}</div>
    <div style="text-align:center"><button class="reload" id="retry">Retry</button></div>`;
  wireHeader();
  document.getElementById("retry").onclick = load;
  hideEditBtn();
}

async function load() {
  editMode = false; editPins = []; shotLayers = {}; mapRef = null;
  logPage = 1; expandedRounds = new Set(); autoExpanded = false;
  app.innerHTML = `<div class="msg">Loading shots…</div>`;
  let r;
  try {
    r = await authFetch(`${CONFIG.base}/shot`);
  } catch (e) {
    errorScreen("Couldn't reach the endpoint. Check that it's deployed and CORS is enabled.");
    return;
  }
  if (!r) { loginScreen(); return; }
  if (r.status === 401) { tok.clear(); loginScreen(); return; }
  if (!r.ok) { errorScreen(`Server returned ${r.status}. Check the endpoint is deployed.`); return; }
  const data = await r.json();
  const shots = data.shots || [];
  shots.forEach(s => { s._uid = s.user + "|" + s.ts; });
  render(shots);
}

function render(shots) {
  currentShots = shots;
  if (filterUser && !shots.some(s => s.user === filterUser)) filterUser = null;

  if (!shots.length) {
    app.innerHTML = header() + `<div class="msg">No shots logged yet. Go pull a club.</div>`;
    wireHeader();
    hideEditBtn();
    return;
  }

  const users = [...new Set(shots.map(s => s.user))].sort();
  const chips = users.length > 1
    ? `<div class="chips">
        <button class="chip${!filterUser ? " active" : ""}" data-u="">Everyone</button>
        ${users.map(u => `<button class="chip${filterUser === u ? " active" : ""}" data-u="${u}">${u}</button>`).join("")}
      </div>`
    : "";

  app.innerHTML = header() + chips + `
    <div id="statsTop"></div>
    <div class="section-label">Course view</div>
    <div id="map"></div>
    <div id="editHint" class="edithint" style="display:none">
      Drag a point to fix it. Shots sharing that scan move together; distances recompute on release.
    </div>
    <div id="statsClubs"></div>
    <div class="section-label">Shot log</div>
    <div id="logRows"></div>`;

  wireHeader();
  for (const btn of document.querySelectorAll(".chip")) {
    btn.onclick = () => { filterUser = btn.dataset.u || null; render(currentShots); };
  }
  refreshStats();
  initMap();
}

// rebuilds totals / club cards / log rows from the visible shots; never touches the map
function refreshStats() {
  const shots = visible();
  if (!shots.length) {
    document.getElementById("statsTop").innerHTML = "";
    document.getElementById("statsClubs").innerHTML = "";
    document.getElementById("logRows").innerHTML = `<div class="msg">No shots for this player yet.</div>`;
    return;
  }
  const showWho = multiUser() && !filterUser;

  computeStrokesGained(shots);

  const byClub = {};
  for (const s of shots) (byClub[s.club] ||= []).push(s);
  const clubs = Object.entries(byClub).map(([club, cs]) => {
    const ds = cs.map(s => s.distance_yds);
    const sgs = cs.filter(s => s.sg != null).map(s => s.sg);
    const avg = ds.reduce((a, b) => a + b, 0) / ds.length;
    const sgTxt = sgs.length ? fmtSG(sgs.reduce((a, b) => a + b, 0) / sgs.length, 2) : null;
    return { club, avg, n: ds.length, max: Math.max(...ds), min: Math.min(...ds), sgTxt };
  }).sort((a, b) => b.avg - a.avg);

  // stable colors: assign once per club per session
  clubs.forEach(c => {
    if (!clubColorMap[c.club]) clubColorMap[c.club] = PALETTE[paletteIdx++ % PALETTE.length];
  });

  const longest = shots.reduce((m, s) => s.distance_yds > m.distance_yds ? s : m, shots[0]);
  const maxAvg = Math.max(...clubs.map(c => c.avg));

  const sgVals = shots.map(s => s.sg).filter(v => v != null);
  const sgTotal = sgVals.length ? fmtSG(sgVals.reduce((a, b) => a + b, 0) / sgVals.length, 2) : null;

  document.getElementById("statsTop").innerHTML = `
    <div class="totals">
      <div class="stat"><div class="n">${shots.length}</div><div class="l">Shots</div></div>
      <div class="stat"><div class="n">${clubs.length}</div><div class="l">Clubs</div></div>
      <div class="stat"><div class="n">${Math.round(longest.distance_yds)}</div><div class="l">Longest · ${longest.club}</div></div>
      ${sgTotal ? `<div class="stat"><div class="n ${sgClass(sgTotal)}">${sgTotal}</div><div class="l">SG / shot</div></div>` : ""}
    </div>`;

  document.getElementById("statsClubs").innerHTML =
    `<div class="section-label">By club</div>` +
    clubs.map(c => `
      <div class="club">
        <div class="club-top">
          <span class="club-name"><span class="cdot" style="background:${clubColorMap[c.club]}"></span>${c.club}</span>
          <span class="club-avg">${Math.round(c.avg)}<span class="u">yds avg</span></span>
        </div>
        <div class="club-meta">
          <span>${c.n} shot${c.n > 1 ? "s" : ""}</span>
          <span>${Math.round(c.min)}–${Math.round(c.max)} range</span>
          ${c.sgTxt ? `<span class="${sgClass(c.sgTxt)}">${c.sgTxt} SG avg</span>` : ""}
        </div>
        <div class="bar"><span style="width:${(c.avg / maxAvg * 100).toFixed(1)}%"></span></div>
      </div>`).join("")
    + `<div class="footnote">SG: strokes gained vs PGA Tour baseline, tee to green — each hole's last scan point stands in for the pin; putts aren't tracked.</div>`;

  renderLog(shots, showWho);
}

// ---- shot log: rounds (date + course), paginated ----
// Shots carry no course field, so courses are inferred by clustering scan
// points: a shot joins the nearest known course centroid within
// COURSE_RADIUS_YDS, else it founds a new course. Chronological order makes
// the clustering deterministic, and clustering currentShots (not the
// filtered view) keeps course identity stable across user-filter changes.
const COURSE_RADIUS_YDS = 2500;

function computeCourses(shots) {
  const seq = [...shots].sort((a, b) => (a.ts < b.ts ? -1 : a.ts > b.ts ? 1 : 0));
  const courses = [];
  for (const s of seq) {
    let best = null, bestD = Infinity;
    for (const c of courses) {
      const d = distYds(c.lat, c.lon, s.from_lat, s.from_lon);
      if (d < bestD) { bestD = d; best = c; }
    }
    if (!best || bestD > COURSE_RADIUS_YDS) {
      // key by the founding scan point (stable), not the centroid (drifts)
      best = { key: s.from_lat.toFixed(4) + "," + s.from_lon.toFixed(4), lat: s.from_lat, lon: s.from_lon, n: 0 };
      courses.push(best);
    }
    best.lat = (best.lat * best.n + s.from_lat) / (best.n + 1);
    best.lon = (best.lon * best.n + s.from_lon) / (best.n + 1);
    best.n++;
    s._course = best;
  }
  return courses;
}

let courseNames = {};
try { courseNames = JSON.parse(localStorage.getItem("nmg_course_names")) || {}; } catch { /* corrupt cache; refetch */ }
const geocodeAttempted = new Set();
let geocodeBusy = false;

function courseLabel(c) {
  return courseNames[c.key] || `Course @ ${c.lat.toFixed(3)}, ${c.lon.toFixed(3)}`;
}

async function geocodeCourse(c) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=17&lat=${c.lat}&lon=${c.lon}`);
    if (!r.ok) return null;
    const d = await r.json();
    return d.name || (d.display_name || "").split(",")[0].trim() || null;
  } catch { return null; }
}

// Names come from OpenStreetMap reverse geocoding, once per course ever:
// results persist in localStorage and headers are patched in place when a
// name arrives. Offline/unnamed, the coordinate fallback label stands.
async function resolveCourseNames(courses) {
  if (geocodeBusy) return;
  geocodeBusy = true;
  try {
    for (const c of courses) {
      if (courseNames[c.key] || geocodeAttempted.has(c.key)) continue;
      geocodeAttempted.add(c.key);
      const name = await geocodeCourse(c);
      if (name) {
        courseNames[c.key] = name;
        try { localStorage.setItem("nmg_course_names", JSON.stringify(courseNames)); } catch { /* storage full; name lives for the session */ }
        for (const el of document.querySelectorAll(`.course[data-ck="${CSS.escape(c.key)}"]`)) el.textContent = name;
      }
      await new Promise(res => setTimeout(res, 1100)); // Nominatim asks ≤1 req/s
    }
  } finally { geocodeBusy = false; }
}

function shotRow(s, showWho) {
  const low = isLowConf(s);
  const sg = s.sg != null ? fmtSG(s.sg, 1) : null;
  const who = showWho ? ` · <span class="who">${s.user}</span>` : "";
  const del = s.mine ? `
      <button class="del" data-uid="${encodeURIComponent(s._uid)}" aria-label="Delete shot">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>` : "";
  return `
    <div class="shot${s.mine ? "" : " nodel"}">
      <span class="club-tag">${s.club}</span>
      <span class="when">${fmtTime(s.ts)}${who}${sg ? ` · <span class="sgtag ${sgClass(sg)}">${sg}</span>` : ""}${s.edited ? ` · <span class="editedtag">edited</span>` : ""}${low ? ` · <span class="lowconf">±${Math.round(s.accuracy)}m</span>` : ""}</span>
      <span class="dist">${Math.round(s.distance_yds)}<span class="u">yds</span></span>${del}
    </div>`;
}

// Only the log is paginated — totals, club averages, SG, and the map are
// computed from every visible shot, so collapsed/older rounds still count.
function renderLog(shots, showWho) {
  const courses = computeCourses(currentShots);

  const groups = new Map(); // insertion order = newest round first
  for (const s of [...shots].reverse()) {
    const k = dateKey(s.ts) + "|" + s._course.key;
    if (!groups.has(k)) groups.set(k, { key: k, ts: s.ts, course: s._course, shots: [] });
    groups.get(k).shots.push(s);
  }
  const rounds = [...groups.values()];

  const shown = rounds.slice(0, logPage * ROUNDS_PER_PAGE);
  if (!autoExpanded && shown.length) { expandedRounds.add(shown[0].key); autoExpanded = true; }

  document.getElementById("logRows").innerHTML = shown.map(g => {
    const open = expandedRounds.has(g.key);
    const sgs = g.shots.filter(s => s.sg != null).map(s => s.sg);
    const sgSum = sgs.length ? fmtSG(sgs.reduce((a, b) => a + b, 0), 1) : null;
    return `
      <div class="round">
        <button class="round-hd" data-rk="${g.key}" aria-expanded="${open}">
          <span class="chev">${open ? "▾" : "▸"}</span>
          <span class="round-title">${fmtDate(g.ts)} · <span class="course" data-ck="${g.course.key}">${courseLabel(g.course)}</span></span>
          <span class="round-meta">${g.shots.length} shot${g.shots.length > 1 ? "s" : ""}${sgSum ? ` · <span class="sgtag ${sgClass(sgSum)}">${sgSum} SG</span>` : ""}</span>
        </button>
        ${open ? `<div class="round-rows">${g.shots.map(s => shotRow(s, showWho)).join("")}</div>` : ""}
      </div>`;
  }).join("") + (rounds.length > shown.length
    ? `<div class="morewrap"><button class="reload" id="moreRounds">Show older rounds (${rounds.length - shown.length} more)</button></div>`
    : "");

  for (const hd of document.querySelectorAll(".round-hd")) {
    hd.onclick = () => {
      const k = hd.dataset.rk;
      if (expandedRounds.has(k)) expandedRounds.delete(k); else expandedRounds.add(k);
      refreshStats();
    };
  }
  const more = document.getElementById("moreRounds");
  if (more) more.onclick = () => { logPage++; refreshStats(); };

  for (const btn of document.querySelectorAll(".del")) {
    btn.onclick = () => deleteShot(decodeURIComponent(btn.dataset.uid));
  }

  resolveCourseNames(courses);
}

async function deleteShot(uid) {
  const s = currentShots.find(x => x._uid === uid);
  if (!s) return;
  if (!confirm(`Delete this shot?\n\n${s.club} · ${Math.round(s.distance_yds)} yds`)) return;
  try {
    const r = await authFetch(`${CONFIG.base}/shot?ts=${encodeURIComponent(s.ts)}`, { method: "DELETE" });
    if (!r) { loginScreen(); return; }
    if (!r.ok) {
      alert(`Couldn't delete (server returned ${r.status}).`);
      return;
    }
    load(); // full refresh; exits edit mode
  } catch (e) {
    alert("Couldn't reach the endpoint to delete.");
  }
}

// ---- strokes gained ----
// Tee-to-green strokes gained vs the PGA Tour baseline (Broadie's
// expected-strokes tables), computed from the logged scan points alone.
// Holes are rebuilt by chaining shots that share a scan point, and the last
// point of each hole (where putting began, or where End was pressed) stands
// in for the pin. Lies are unknown, so a hole's first shot is priced off the
// tee table and everything else off the fairway table; putts aren't
// distance-tracked, so putting SG and penalty strokes are out of scope.
const PUTTER_NAMES = new Set(["putter", "p", "putt"]); // keep in sync with trackShot
const E_TEE = [ // [yards to pin, expected strokes]
  [100, 2.92], [120, 2.99], [140, 2.97], [160, 2.99], [180, 3.05],
  [200, 3.12], [220, 3.17], [240, 3.25], [260, 3.45], [280, 3.65],
  [300, 3.71], [320, 3.79], [340, 3.86], [360, 3.92], [380, 3.96],
  [400, 3.99], [420, 4.02], [440, 4.08], [460, 4.17], [480, 4.28],
  [500, 4.41], [520, 4.54], [540, 4.65], [560, 4.74], [580, 4.79], [600, 4.82]
];
const E_FAIRWAY = [
  [10, 2.18], [20, 2.40], [40, 2.60], [60, 2.70], [80, 2.75], [100, 2.80],
  [120, 2.85], [140, 2.91], [160, 2.98], [180, 3.08], [200, 3.19],
  [220, 3.32], [240, 3.45], [260, 3.58], [280, 3.69], [300, 3.78],
  [320, 3.84], [340, 3.88], [360, 3.95], [380, 4.03], [400, 4.11],
  [420, 4.15], [440, 4.20], [460, 4.29], [480, 4.40], [500, 4.53],
  [520, 4.66], [540, 4.78], [560, 4.86], [580, 4.91], [600, 4.94]
];
const E_GREEN_FT = [ // [feet to pin, expected putts]
  [1, 1.001], [2, 1.009], [3, 1.053], [4, 1.147], [5, 1.256], [6, 1.357],
  [7, 1.443], [8, 1.515], [9, 1.575], [10, 1.626], [15, 1.784], [20, 1.869],
  [30, 1.978], [40, 2.058], [50, 2.135], [60, 2.211], [90, 2.549]
];
// tour-typical first-putt distance (ft) after reaching the green from d yards
// out; prices the "found the green" end state, since putts aren't tracked
const PIN_PROX_FT = [
  [10, 4], [20, 7], [30, 9], [50, 12], [75, 15], [100, 17], [125, 20],
  [150, 23], [175, 27], [200, 32], [225, 38], [250, 45], [300, 55]
];

function isPutt(s) {
  return PUTTER_NAMES.has(String(s.club).trim().toLowerCase());
}

// same equirectangular approximation trackShot uses for distance_yds
function distYds(lat1, lon1, lat2, lon2) {
  const rad = Math.PI / 180;
  const x = (lon2 - lon1) * rad * Math.cos(((lat1 + lat2) / 2) * rad);
  const y = (lat2 - lat1) * rad;
  return Math.sqrt(x * x + y * y) * 6371000 * 1.09361;
}

function lerpTable(t, x) {
  if (x <= t[0][0]) return t[0][1];
  if (x >= t[t.length - 1][0]) return t[t.length - 1][1];
  let i = 1;
  while (t[i][0] < x) i++;
  return t[i - 1][1] + (t[i][1] - t[i - 1][1]) * (x - t[i - 1][0]) / (t[i][0] - t[i - 1][0]);
}

function expStrokes(yds, fromTee) {
  if (fromTee && yds >= E_TEE[0][0]) return lerpTable(E_TEE, yds);
  return lerpTable(E_FAIRWAY, yds);
}

// consecutive shots chain while one ends exactly where the next begins (the
// shared scan point — see commitEdit); a break in the chain is a new hole
function splitHoles(shots) {
  const EPS = 1e-9;
  const holes = [];
  let hole = [];
  for (const s of shots) {
    const prev = hole[hole.length - 1];
    if (prev && !(Math.abs(prev.to_lat - s.from_lat) < EPS && Math.abs(prev.to_lon - s.from_lon) < EPS)) {
      holes.push(hole);
      hole = [];
    }
    hole.push(s);
  }
  if (hole.length) holes.push(hole);
  return holes;
}

// annotates each shot with s.sg (null for putts — putting isn't tracked)
function computeStrokesGained(shots) {
  for (const s of shots) s.sg = null;
  const byUser = {};
  for (const s of shots) (byUser[s.user] ||= []).push(s);
  for (const seq of Object.values(byUser)) {
    seq.sort((a, b) => (a.ts < b.ts ? -1 : a.ts > b.ts ? 1 : 0));
    for (const hole of splitHoles(seq)) {
      const pin = hole[hole.length - 1]; // its to-point stands in for the pin
      hole.forEach((s, i) => {
        if (isPutt(s)) return;
        const dStart = distYds(s.from_lat, s.from_lon, pin.to_lat, pin.to_lon);
        let eEnd;
        if (i === hole.length - 1) {
          eEnd = lerpTable(E_GREEN_FT, lerpTable(PIN_PROX_FT, dStart));
        } else {
          const dEnd = distYds(s.to_lat, s.to_lon, pin.to_lat, pin.to_lon);
          eEnd = isPutt(hole[i + 1])
            ? lerpTable(E_GREEN_FT, dEnd * 3) // next shot is a putt: this one found the green
            : expStrokes(dEnd, false);
        }
        s.sg = expStrokes(dStart, i === 0) - eEnd - 1;
      });
    }
  }
}

function fmtSG(v, dp) {
  const a = Math.abs(v).toFixed(dp);
  return (v < 0 && +a > 0 ? "-" : "+") + a;
}

function sgClass(txt) {
  return txt[0] === "-" ? "sg-neg" : "sg-pos";
}

// ---- map ----
function initMap() {
  if (!window.L) return; // map library didn't load; rest of the page still works
  const shots = visible();
  if (!shots.length) return;
  mapRef = L.map("map");
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    maxZoom: 19,
    attribution: "Imagery &copy; Esri"
  }).addTo(mapRef);

  const pts = [];
  for (const s of shots) {
    addShotLayers(s);
    pts.push([s.from_lat, s.from_lon], [s.to_lat, s.to_lon]);
  }
  if (pts.length) mapRef.fitBounds(pts, { padding: [28, 28], maxZoom: 18 });
}

function addShotLayers(s) {
  const color = clubColorMap[s.club] || "#e4c261";
  const line = L.polyline([[s.from_lat, s.from_lon], [s.to_lat, s.to_lon]], {
    color, weight: 3, opacity: 0.9,
    dashArray: isLowConf(s) ? "5 6" : null
  }).addTo(mapRef).bindPopup(popupHtml(s));
  const dot = L.circleMarker([s.to_lat, s.to_lon], {
    radius: 3.5, color: "#0a1f17", weight: 1,
    fillColor: color, fillOpacity: 1
  }).addTo(mapRef);
  shotLayers[s._uid] = { line, dot };
}

// ---- edit mode ----
function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById("edit");
  btn.classList.toggle("active", editMode);
  btn.textContent = editMode ? "Done" : "Edit";
  document.getElementById("editHint").style.display = editMode ? "block" : "none";
  if (editMode) addEditPins(); else removeEditPins();
}

function addEditPins() {
  for (const s of visible()) {
    if (!s.mine) continue; // can only fix your own shots
    addPin(s, "from");
    addPin(s, "to");
  }
}

function addPin(s, which) {
  const color = clubColorMap[s.club] || "#e4c261";
  const isFrom = which === "from";
  const icon = L.divIcon({
    className: "",
    html: `<div class="drag-pin" style="border:3px solid ${color};background:${isFrom ? "rgba(10,31,23,0.6)" : color}"></div>`,
    iconSize: [18, 18], iconAnchor: [9, 9]
  });
  const marker = L.marker([s[which + "_lat"], s[which + "_lon"]], {
    icon, draggable: true, zIndexOffset: 500
  }).addTo(mapRef);

  marker.on("drag", e => {
    const ll = e.target.getLatLng();
    const ly = shotLayers[s._uid];
    const from = isFrom ? [ll.lat, ll.lng] : [s.from_lat, s.from_lon];
    const to = isFrom ? [s.to_lat, s.to_lon] : [ll.lat, ll.lng];
    ly.line.setLatLngs([from, to]);
    if (!isFrom) ly.dot.setLatLng(ll);
  });

  marker.on("dragend", e => {
    const ll = e.target.getLatLng();
    commitEdit(s, which, ll.lat, ll.lng);
  });

  editPins.push({ marker, s, which });
}

function removeEditPins() {
  for (const p of editPins) mapRef.removeLayer(p.marker);
  editPins = [];
}

// A scan point is written into two records: shot N's `to` and shot N+1's `from`.
// Editing one moves every endpoint born from the same scan, then saves each affected shot.
async function commitEdit(s, which, lat, lon) {
  const EPS = 1e-9; // same-scan coords are bit-identical; this only groups true siblings
  const origLat = s[which + "_lat"], origLon = s[which + "_lon"];

  const targets = [];
  for (const sh of currentShots) {
    if (!sh.mine) continue; // only your own shots are editable
    for (const w of ["from", "to"]) {
      if (Math.abs(sh[w + "_lat"] - origLat) < EPS && Math.abs(sh[w + "_lon"] - origLon) < EPS) {
        targets.push({ sh, w });
      }
    }
  }
  const affected = [...new Set(targets.map(t => t.sh))];
  const backup = affected.map(sh => ({
    sh, from_lat: sh.from_lat, from_lon: sh.from_lon,
    to_lat: sh.to_lat, to_lon: sh.to_lon,
    distance_yds: sh.distance_yds, edited: sh.edited
  }));

  targets.forEach(t => { t.sh[t.w + "_lat"] = lat; t.sh[t.w + "_lon"] = lon; });

  try {
    for (const sh of affected) {
      const r = await authFetch(`${CONFIG.base}/shot`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ts: sh.ts,
          from_lat: sh.from_lat, from_lon: sh.from_lon,
          to_lat: sh.to_lat, to_lon: sh.to_lon
        })
      });
      if (!r || !r.ok) throw new Error("HTTP " + (r ? r.status : "auth"));
      const data = await r.json();
      sh.distance_yds = data.distance_yds;
      sh.edited = true;
    }
    refreshStats(); // before syncLayers: popups show the recomputed SG
    syncLayers(affected);
  } catch (err) {
    for (const b of backup) {
      Object.assign(b.sh, {
        from_lat: b.from_lat, from_lon: b.from_lon,
        to_lat: b.to_lat, to_lon: b.to_lon,
        distance_yds: b.distance_yds, edited: b.edited
      });
    }
    syncLayers(affected);
    alert("Couldn't save the edit — reverted.");
  }
}

// bring lines, dots, popups, and every edit pin in line with currentShots
function syncLayers(affectedShots) {
  for (const sh of affectedShots) {
    const ly = shotLayers[sh._uid];
    if (!ly) continue;
    ly.line.setLatLngs([[sh.from_lat, sh.from_lon], [sh.to_lat, sh.to_lon]]);
    ly.line.setStyle({ dashArray: isLowConf(sh) ? "5 6" : null });
    ly.line.setPopupContent(popupHtml(sh));
    ly.dot.setLatLng([sh.to_lat, sh.to_lon]);
  }
  for (const p of editPins) {
    p.marker.setLatLng([p.s[p.which + "_lat"], p.s[p.which + "_lon"]]);
  }
}

// ---- device keys ----
async function showKeys() {
  let keys = [];
  try {
    const r = await authFetch(`${CONFIG.base}/keys`);
    if (!r) { loginScreen(); return; }
    if (!r.ok) { alert(`Couldn't load keys (server returned ${r.status}).`); return; }
    keys = (await r.json()).keys || [];
  } catch (e) {
    alert("Couldn't reach the endpoint.");
    return;
  }
  renderKeysPanel(keys, null);
}

function renderKeysPanel(keys, freshKey) {
  closeKeysPanel();
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.id = "keysOverlay";
  overlay.innerHTML = `
    <div class="panel">
      <div class="section-label">Device keys</div>
      <p>A device key lets an iOS Shortcut log shots as you. In the Shortcut's
      “Get Contents of URL” action, add a header named <code class="inline">x-api-key</code>
      with your key as the value.</p>
      ${freshKey ? `
        <div class="newkey">
          <code id="freshKey">${freshKey}</code>
          <div class="krow-actions">
            <button class="reload" id="copyKey">Copy</button>
          </div>
          <div class="warn">Save it now — you won't be able to see it again.</div>
        </div>` : ""}
      <div id="keyList">
        ${keys.length ? keys.map(k => `
          <div class="keyrow" data-id="${k.id}">
            <span class="klabel">${k.label || "Device key"}</span>
            <span class="kmeta">····${k.last4}</span>
            <span class="kmeta">${k.created ? k.created.slice(0, 10) : ""}</span>
            <button class="reload krevoke" data-id="${k.id}">Revoke</button>
          </div>`).join("") : `<p>No keys yet.</p>`}
      </div>
      <div class="krow-actions">
        <input id="keyLabel" placeholder="Label (e.g. Harin's iPhone)" maxlength="60">
        <button class="reload" id="keyCreate">New key</button>
      </div>
      <div class="krow-actions">
        <button class="reload" id="keysClose">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.onclick = e => { if (e.target === overlay) closeKeysPanel(); };
  document.getElementById("keysClose").onclick = closeKeysPanel;
  document.getElementById("keyCreate").onclick = createKey;
  if (freshKey) {
    document.getElementById("copyKey").onclick = async () => {
      try {
        await navigator.clipboard.writeText(freshKey);
        document.getElementById("copyKey").textContent = "Copied";
      } catch { /* clipboard unavailable; key is visible to copy manually */ }
    };
  }
  for (const btn of overlay.querySelectorAll(".krevoke")) {
    btn.onclick = () => revokeKey(btn.dataset.id);
  }
}

function closeKeysPanel() {
  const el = document.getElementById("keysOverlay");
  if (el) el.remove();
}

async function createKey() {
  const label = (document.getElementById("keyLabel").value || "").trim() || "Device key";
  try {
    const r = await authFetch(`${CONFIG.base}/keys`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ label })
    });
    if (!r) { loginScreen(); return; }
    if (!r.ok) { alert(`Couldn't create key (server returned ${r.status}).`); return; }
    const created = await r.json();
    const lr = await authFetch(`${CONFIG.base}/keys`);
    const keys = lr && lr.ok ? (await lr.json()).keys || [] : [];
    renderKeysPanel(keys, created.key);
  } catch (e) {
    alert("Couldn't reach the endpoint.");
  }
}

async function revokeKey(id) {
  if (!confirm("Revoke this key? Shortcuts using it will stop logging.")) return;
  try {
    const r = await authFetch(`${CONFIG.base}/keys?id=${encodeURIComponent(id)}`, { method: "DELETE" });
    if (!r) { loginScreen(); return; }
    if (!r.ok) { alert(`Couldn't revoke (server returned ${r.status}).`); return; }
    const lr = await authFetch(`${CONFIG.base}/keys`);
    const keys = lr && lr.ok ? (await lr.json()).keys || [] : [];
    renderKeysPanel(keys, null);
  } catch (e) {
    alert("Couldn't reach the endpoint.");
  }
}

// ---- boot ----
(async function boot() {
  await handleCallback();
  load();
})();
</script>
